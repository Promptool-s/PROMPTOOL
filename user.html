    <script>
      // /user/nombredeusuario -> redirige a usuario.html?u=nombredeusuario
      const path = window.location.pathname
      const match = path.match(/^\/user\/([^/]+)/)
      if (match) {
        const username = match[1]
        window.location.replace('/usuario.html?u=' + encodeURIComponent(username))
      }
    </script>
